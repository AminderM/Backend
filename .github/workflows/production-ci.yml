name: Production CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "
          import sys
          import os
          if not os.environ.get('MONGO_URL') or os.environ.get('MONGO_URL').strip() == '':
              os.environ['MONGO_URL'] = 'mongodb://localhost:27017'
          if not os.environ.get('DB_NAME') or os.environ.get('DB_NAME').strip() == '':
              os.environ['DB_NAME'] = 'test_db'
          if not os.environ.get('JWT_SECRET') or os.environ.get('JWT_SECRET').strip() == '':
              os.environ['JWT_SECRET'] = 'test-secret-key-for-build-check'

          try:
              import server
              print('Server module imports successfully')
          except Exception as e:
              error_msg = str(e)
              if 'ConfigurationError' in str(type(e).__name__) or 'Empty host' in error_msg or 'MONGO_URL' in error_msg:
                  print('Warning: MongoDB connection failed (expected if secrets not set), but module structure is valid')
                  sys.exit(0)
              else:
                  print(f'Import error: {e}')
                  raise
          "
        env:
          MONGO_URL: ${{ vars.MONGO_URL }}
          DB_NAME: ${{ vars.DB_NAME }}
          JWT_SECRET: ${{ vars.JWT_SECRET }}
          EMERGENT_LLM_KEY: ${{ vars.EMERGENT_LLM_KEY }}
          FMCSA_API_KEY: ${{ vars.FMCSA_API_KEY }}
        continue-on-error: true

      - name: Check for syntax errors
        run: |
          python -m py_compile server.py
          find . -name "*.py" -type f -exec python -m py_compile {} \;
        continue-on-error: true

  deploy:
    name: Deploy to Production EC2
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY || vars.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST || vars.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST || vars.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || vars.EC2_USER || 'ubuntu' }}
          MONGO_URL: ${{ vars.MONGO_URL }}
          DB_NAME: ${{ vars.DB_NAME }}
          JWT_SECRET: ${{ vars.JWT_SECRET }}
          EMERGENT_LLM_KEY: ${{ vars.EMERGENT_LLM_KEY }}
          FMCSA_API_KEY: ${{ vars.FMCSA_API_KEY }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${EC2_USER}@${EC2_HOST} \
            MONGO_URL="${MONGO_URL}" \
            DB_NAME="fleetdb_prod" \
            JWT_SECRET="${JWT_SECRET}" \
            EMERGENT_LLM_KEY="${EMERGENT_LLM_KEY}" \
            FMCSA_API_KEY="${FMCSA_API_KEY}" \
            bash << 'EOF'
            set -e
            echo "🚀 Starting PRODUCTION deployment..."

            PROD_DIR=~/apps/production/Backend

            # ── First-time setup: clone repo if directory doesn't exist ──────
            if [ ! -d "$PROD_DIR" ]; then
              echo "📁 First run — creating production directory..."
              mkdir -p ~/apps/production
              REMOTE_URL=$(git -C ~/apps/staging/Backend remote get-url origin 2>/dev/null || echo "")
              if [ -z "$REMOTE_URL" ]; then
                echo "❌ Could not get remote URL from staging. Ensure ~/apps/staging/Backend exists."
                exit 1
              fi
              git clone -b main "$REMOTE_URL" "$PROD_DIR"
              echo "✅ Repository cloned to $PROD_DIR"
            fi

            cd "$PROD_DIR"

            # ── Pull latest code from main ────────────────────────────────────
            echo "📥 Pulling latest code from main branch..."
            git fetch origin
            git checkout main
            git reset --hard origin/main

            # ── Write .env file from GitHub vars (overwrites each deploy) ─────
            echo "📝 Writing production .env file..."
            {
              echo "MONGO_URL=${MONGO_URL}"
              echo "DB_NAME=fleetdb_prod"
              echo "JWT_SECRET=${JWT_SECRET}"
              echo "EMERGENT_LLM_KEY=${EMERGENT_LLM_KEY}"
              echo "FMCSA_API_KEY=${FMCSA_API_KEY}"
            } > .env
            echo "✅ .env written"

            # ── Create venv if it doesn't exist ───────────────────────────────
            if [ ! -d "venv" ]; then
              echo "🐍 Creating virtual environment..."
              python3 -m venv venv
              echo "✅ Virtual environment created"
            fi

            echo "🐍 Activating virtual environment..."
            source venv/bin/activate

            # ── Install/update dependencies ───────────────────────────────────
            echo "📦 Installing dependencies..."
            pip install -q -r requirements.txt

            # ── Stop ONLY production server (port 8002) ───────────────────────
            echo "🛑 Stopping existing production server on port 8002..."
            fuser -k 8002/tcp || true
            sleep 2

            # ── Start server on port 8002 ─────────────────────────────────────
            echo "🚀 Starting production server on port 8002..."
            PORT=8002 nohup venv/bin/python server.py > nohup-prod.out 2>&1 &
            SERVER_PID=$!
            echo "✅ Server started with PID: $SERVER_PID"

            sleep 3

            if ps -p $SERVER_PID > /dev/null 2>&1; then
              echo "✅ Server is running (PID: $SERVER_PID)"
            else
              echo "⚠️ Server may have crashed — last 20 lines of nohup-prod.out:"
              tail -20 nohup-prod.out || true
            fi

            echo "✅ PRODUCTION deployment completed!"
          EOF

      - name: Verify deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST || vars.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || vars.EC2_USER || 'ubuntu' }}
        run: |
          echo "⏳ Waiting for server to be ready..."
          sleep 8

          if [ -z "${EC2_HOST}" ]; then
            echo "⚠️ EC2_HOST not set, skipping verification"
            exit 0
          fi

          MAX_RETRIES=3
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -f -s --max-time 5 http://${EC2_HOST}:8002/ > /dev/null 2>&1; then
              echo "✅ Production server is responding!"
              curl -s --max-time 5 http://${EC2_HOST}:8002/ | head -5
              exit 0
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "⏳ Attempt $RETRY_COUNT/$MAX_RETRIES - Server not ready yet, waiting..."
              sleep 3
            fi
          done

          echo "⚠️ Please verify manually at http://${EC2_HOST}:8002/"
