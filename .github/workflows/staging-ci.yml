name: Staging CI/CD

on:
  push:
    branches:
      - staging
  pull_request:
    branches:
      - staging

jobs:

  build:
    name: Build Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Verify imports
        run: |
          python -c "
          import sys
          import os
          # Ensure we have valid defaults if secrets are empty
          if not os.environ.get('MONGO_URL') or os.environ.get('MONGO_URL').strip() == '':
              os.environ['MONGO_URL'] = 'mongodb://localhost:27017'
          if not os.environ.get('DB_NAME') or os.environ.get('DB_NAME').strip() == '':
              os.environ['DB_NAME'] = 'test_db'
          if not os.environ.get('JWT_SECRET') or os.environ.get('JWT_SECRET').strip() == '':
              os.environ['JWT_SECRET'] = 'test-secret-key-for-build-check'
          
          try:
              import server
              print('Server module imports successfully')
          except Exception as e:
              # If MongoDB connection fails, that's okay for build check
              error_msg = str(e)
              if 'ConfigurationError' in str(type(e).__name__) or 'Empty host' in error_msg or 'MONGO_URL' in error_msg:
                  print('Warning: MongoDB connection failed (expected if secrets not set), but module structure is valid')
                  sys.exit(0)
              else:
                  print(f'Import error: {e}')
                  raise
          "
        env:
          MONGO_URL: ${{ vars.MONGO_URL }}
          DB_NAME: ${{ vars.DB_NAME }}
          JWT_SECRET: ${{ vars.JWT_SECRET }}
          EMERGENT_LLM_KEY: ${{ vars.EMERGENT_LLM_KEY }}
          FMCSA_API_KEY: ${{ vars.FMCSA_API_KEY }}
        continue-on-error: true
      
      - name: Check for syntax errors
        run: |
          python -m py_compile server.py
          find . -name "*.py" -type f -exec python -m py_compile {} \;
        continue-on-error: true

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY || vars.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST || vars.EC2_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST || vars.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || vars.EC2_USER || 'ubuntu' }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${EC2_USER}@${EC2_HOST} << 'EOF'
            set -e
            echo "🚀 Starting deployment..."
            
            # Navigate to project directory
            cd ~/apps/staging/Backend || cd /home/ubuntu/apps/staging/Backend || {
              echo "❌ Project directory not found at ~/apps/staging/Backend"
              exit 1
            }
            
            # Pull latest code from staging branch
            echo "📥 Pulling latest code from staging branch..."
            git fetch origin
            git checkout staging
            git pull origin staging
            
            # Activate virtual environment if it exists, otherwise use system python
            if [ -d "venv" ]; then
              echo "🐍 Activating virtual environment..."
              source venv/bin/activate
            fi
            
            # Install/update dependencies if requirements.txt changed
            echo "📦 Checking dependencies..."
            pip install -q -r requirements.txt
            
            # Restart the server
            echo "🔄 Restarting server..."
            
            # Determine Python interpreter
            PYTHON_CMD="python3"
            if [ -d "venv" ]; then
              PYTHON_CMD="$(pwd)/venv/bin/python"
              echo "Using venv Python: $PYTHON_CMD"
            fi
            
            # Kill any existing server processes
            echo "🛑 Stopping existing server processes..."
            pkill -f "python.*server.py" || true
            pkill -f "uvicorn.*server.*8001" || true
            # Also try to stop PM2 server if it exists
            if command -v pm2 &> /dev/null; then
              pm2 delete server 2>/dev/null || true
            fi
            
            # Wait a moment for processes to stop
            sleep 2
            
            # Start server using nohup (as you do manually)
            echo "🚀 Starting server with nohup..."
            nohup $PYTHON_CMD server.py > nohup.out 2>&1 &
            
            # Get the process ID
            SERVER_PID=$!
            echo "✅ Server started with PID: $SERVER_PID"
            
            # Wait a moment for server to start
            sleep 3
            
            # Check if server is still running
            if ps -p $SERVER_PID > /dev/null 2>&1; then
              echo "✅ Server process is running (PID: $SERVER_PID)"
            else
              echo "⚠️ Server process may have crashed. Checking nohup.out..."
              tail -20 nohup.out || true
            fi
            
            echo "✅ Deployment completed!"
            echo "🌐 Server should be available at http://${EC2_HOST}:8001/"
          EOF
      
      - name: Verify deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST || vars.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || vars.EC2_USER || 'ubuntu' }}
        run: |
          echo "⏳ Waiting for server to be ready..."
          sleep 8
          
          # Check if EC2_HOST is set
          if [ -z "${EC2_HOST}" ]; then
            echo "⚠️ EC2_HOST not set, skipping verification"
            exit 0
          fi
          
          # Try to verify server is responding
          MAX_RETRIES=3
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -f -s --max-time 5 http://${EC2_HOST}:8001/ > /dev/null 2>&1; then
              echo "✅ Server is responding!"
              echo "Response:"
              curl -s --max-time 5 http://${EC2_HOST}:8001/ | head -5
              exit 0
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "⏳ Attempt $RETRY_COUNT/$MAX_RETRIES - Server not ready yet, waiting..."
              sleep 3
            fi
          done
          
          # If still not responding, check PM2 status via SSH
          echo "⚠️ Server might still be starting. Checking PM2 status..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${EC2_USER}@${EC2_HOST} "cd ~/apps/staging/Backend && pm2 status server || echo 'PM2 not available'" || echo "Could not check PM2 status"
          echo "⚠️ Please verify manually at http://${EC2_HOST}:8001/"

